<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dedhi Babyshop - Perlengkapan Renang Anak</title>
    <style>
        /* Desain dasar website */
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f8fb; /* Warna biru air laut muda */
            margin: 0;
            padding: 0;
            text-align: center; 
        }
        .header { 
            background-color: #ff99cc; /* Warna pink ceria khas babyshop */
            padding: 25px; 
            color: white; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .header h1 { margin: 0; font-size: 28px; }
        .header p { margin: 5px 0 0 0; font-size: 16px; }
        
        /* Grid untuk produk */
        .catalog { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 20px; 
            padding: 30px; 
        }
        
        /* Kartu masing-masing produk */
        .product-card { 
            background: white; 
            border-radius: 12px; 
            padding: 15px; 
            width: 260px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
            transition: transform 0.2s;
        }
        .product-card:hover { transform: translateY(-5px); }
        .product-card img { 
            width: 100%; 
            height: 250px;
            object-fit: cover;
            border-radius: 8px; 
        }
        .product-title { font-size: 18px; font-weight: bold; margin: 12px 0 8px 0; color: #333; }
        .product-price { color: #ee4d2d; font-size: 18px; font-weight: bold; }
        .product-stock { font-size: 14px; color: #666; margin: 8px 0 15px 0; }
        
        /* Tombol Shopee */
        .shopee-btn { 
            background-color: #ee4d2d; /* Warna khas Shopee */
            color: white; 
            text-decoration: none; 
            padding: 10px 15px; 
            border-radius: 5px; 
            display: block; 
            font-weight: bold; 
        }
        .shopee-btn:hover { background-color: #d73a1e; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Dedhi Babyshop</h1>
        <p>Spesialis Baju Renang, Kostum Mermaid & Pelampung Anak</p>
    </div>

    <div class="catalog">
        
        <div class="product-card">
            <img src="https://via.placeholder.com/250x250?text=Foto+Pelampung" alt="Pelampung Anak">
            <div class="product-title">Pelampung Lengan Karakter</div>
            <div class="product-price">Rp 45.000</div>
            <div class="product-stock">Keterangan: Tersedia</div>
            <a href="LINK_SHOPEE_PRODUK_1" class="shopee-btn" target="_blank">Beli di Shopee</a>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/250x250?text=Foto+Mermaid" alt="Kostum Mermaid">
            <div class="product-title">Kostum Mermaid Anak Set</div>
            <div class="product-price">Rp 85.000</div>
            <div class="product-stock">Keterangan: Sisa 5 pcs</div>
            <a href="LINK_SHOPEE_PRODUK_2" class="shopee-btn" target="_blank">Beli di Shopee</a>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/250x250?text=Foto+Baju+Renang" alt="Baju Renang">
            <div class="product-title">Baju Renang Bayi Anti UV</div>
            <div class="product-price">Rp 65.000</div>
            <div class="product-stock">Keterangan: Pre-Order (3 Hari)</div>
            <a href="LINK_SHOPEE_PRODUK_3" class="shopee-btn" target="_blank">Beli di Shopee</a>
        </div>

    </div>

</body>
</html>
